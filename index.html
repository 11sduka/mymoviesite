<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SineMet | Film ve Dizi Portalı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e50914;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* Шапка сайта */
        header {
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            padding: 20px 5%;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            transition: 0.5s;
        }
        header.scrolled { background: #000; padding: 15px 5%; }
        .logo { color: var(--primary); font-size: 28px; font-weight: 700; text-decoration: none; letter-spacing: 1px; }

        /* Главный баннер */
        .hero {
            height: 85vh;
            position: relative;
            display: flex; align-items: center;
            padding: 0 5%;
            background-size: cover; background-position: center;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.4) 50%, transparent 100%),
                        linear-gradient(to top, var(--bg) 5%, transparent 30%);
        }
        .hero-content { position: relative; z-index: 10; max-width: 700px; }
        .hero-title { font-size: 3.5rem; margin-bottom: 15px; line-height: 1.1; }
        .hero-desc { font-size: 1.1rem; color: #ccc; margin-bottom: 25px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn-play {
            background: var(--primary); color: white; border: none;
            padding: 12px 35px; font-size: 18px; font-weight: 600;
            border-radius: 5px; cursor: pointer; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-play:hover { background: #ff0a16; transform: scale(1.05); }

        /* Сетки контента */
        .main-container { padding: 0 5% 50px 5%; margin-top: -100px; position: relative; z-index: 20; }
        .section-title { font-size: 22px; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--primary); font-size: 18px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 10px; }
        .card-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top: 5px; }
        .rating { color: #ffad1f; font-weight: bold; }

        /* Плеер */
        #player-modal {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: none; flex-direction: column;
        }
        .player-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .close-btn { font-size: 24px; cursor: pointer; color: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Загрузчик */
        .loading-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.2rem; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .card img { height: 190px; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; letter-spacing: 2px;">SINEMET YÜKLENİYOR...</p>
    </div>

    <header id="navbar">
        <a href="#" class="logo">SINEMET</a>
        <div class="search-box" style="color: #ccc;"><i class="fas fa-search"></i></div>
    </header>

    <div id="hero-area"></div>

    <div class="main-container">
        <div class="section-title"><i class="fas fa-fire"></i> Haftalık Popüler</div>
        <div id="trendingGrid" class="cards-grid"></div>

        <div class="section-title"><i class="fas fa-film"></i> Aksiyon Filmleri</div>
        <div id="actionGrid" class="cards-grid"></div>

        <div class="section-title"><i class="fas fa-tv"></i> Popüler Diziler</div>
        <div id="seriesGrid" class="cards-grid"></div>

        <div class="section-title"><i class="fas fa-ghost"></i> Korku & Gerilim</div>
        <div id="horrorGrid" class="cards-grid"></div>
    </div>

    <div id="player-modal">
        <div class="player-header">
            <div id="player-title" style="font-weight: bold;">Film İzle</div>
            <div class="close-btn" onclick="closePlayer()"><i class="fas fa-times"></i></div>
        </div>
        <div id="player-frame-holder" style="flex-grow: 1;"></div>
    </div>

    <script>
        const API_KEY = 'a21c1729b19e87ec3e690f05566cf2c6';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';
        const HD_PATH = 'https://image.tmdb.org/t/p/original';

        // При скролле меняем фон шапки
        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        };

        async function initSite() {
            try {
                // 1. Тренды (для баннера и первой сетки)
                const trending = await fetch(`${BASE_URL}/trending/all/day?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
                setupHero(trending.results[0]);
                renderList(trending.results, 'trendingGrid');

                // 2. Акшн (Жанр 28)
                const action = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=28&language=tr-TR`).then(r => r.json());
                renderList(action.results, 'actionGrid');

                // 3. Сериалы
                const series = await fetch(`${BASE_URL}/tv/popular?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
                renderList(series.results, 'seriesGrid', 'tv');

                // 4. Ужасы (Жанр 27)
                const horror = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=27&language=tr-TR`).then(r => r.json());
                renderList(horror.results, 'horrorGrid');

                // Прячем лоадер
                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                console.error("Hata:", err);
                alert("Veriler yüklenemedi. Lütfen API anahtarını и NoScript ayarlarını kontrol edin.");
            }
        }

        function setupHero(item) {
            const container = document.getElementById('hero-area');
            const title = item.title || item.name;
            container.innerHTML = `
                <div class="hero" style="background-image: url('${HD_PATH}${item.backdrop_path}')">
                    <div class="hero-content">
                        <h1 class="hero-title">${title}</h1>
                        <p class="hero-desc">${item.overview}</p>
                        <button class="btn-play" onclick="openPlayer('${item.media_type || 'movie'}', ${item.id}, '${title.replace(/'/g, "")}')">
                            <i class="fas fa-play"></i> Hemen İzle
                        </button>
                    </div>
                </div>
            `;
        }

        function renderList(data, elementId, defaultType = 'movie') {
            const grid = document.getElementById(elementId);
            grid.innerHTML = '';
            data.slice(0, 12).forEach(item => {
                const title = item.title || item.name;
                const type = item.media_type || defaultType;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openPlayer(type, item.id, title);
                card.innerHTML = `
                    <img src="${IMG_PATH}${item.poster_path}" alt="${title}">
                    <div class="card-body">
                        <div class="card-title">${title}</div>
                        <div class="card-meta">
                            <span>${new Date(item.release_date || item.first_air_date).getFullYear() || ''}</span>
                            <span class="rating"><i class="fas fa-star"></i> ${item.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openPlayer(type, id, title) {
            const modal = document.getElementById('player-modal');
            const holder = document.getElementById('player-frame-holder');
            document.getElementById('player-title').innerText = title;
            
            // Используем стабильный плеер Torrentio
            const videoUrl = `https://stremio-embed.netlify.app/#/player?type=${type}&id=${id}`;
            
            holder.innerHTML = `<iframe src="${videoUrl}" allowfullscreen></iframe>`;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
            document.getElementById('player-frame-holder').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        initSite();
    </script>
</body>
</html>
