<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizyon — Film & Dizi Platformu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #080010; --bg2: #0d0018; --bg3: #120020;
  --purple: #7c6af7; --purple2: #9d8fff; --purple3: #5a4fd4;
  --pink: #c084fc; --text: #f0eaff; --text2: #a094c0;
  --text3: #6a5f8a; --border: #1e1035; --card: #0f0018; --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--purple3); border-radius: 3px; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--purple)08 1px, transparent 1px), linear-gradient(90deg, var(--purple)08 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,0,16,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; gap: 32px; }
.logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; cursor: pointer; flex-shrink: 0; }
.logo span { color: var(--purple); }
.nav-links { display: flex; align-items: center; gap: 4px; flex: 1; }
.nav-link { color: var(--text2); font-size: 14px; font-weight: 500; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap; border: none; background: none; }
.nav-link:hover { color: var(--text); background: var(--border); }
.nav-link.active { color: var(--purple2); background: rgba(124,106,247,0.12); }
.search-wrap { position: relative; flex-shrink: 0; }
.search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px 8px 38px; color: var(--text); font-size: 14px; width: 220px; outline: none; transition: all 0.2s; }
.search-input:focus { border-color: var(--purple3); width: 280px; background: var(--bg2); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; }
.ad-banner-top { margin-top: 64px; width: 100%; min-height: 90px; background: rgba(124,106,247,0.04); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 13px; }
.hero { position: relative; height: 560px; overflow: hidden; z-index: 1; }
.hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; filter: brightness(0.35) saturate(0.8); transition: all 0.6s; }
.hero-gradient { position: absolute; inset: 0; background: linear-gradient(to right, var(--bg) 30%, transparent 70%), linear-gradient(to top, var(--bg) 0%, transparent 50%); }
.hero-content { position: absolute; bottom: 60px; left: 40px; max-width: 500px; }
.hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,106,247,0.2); border: 1px solid rgba(124,106,247,0.4); color: var(--purple2); font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; text-transform: uppercase; }
.hero-title { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; line-height: 1.05; margin-bottom: 12px; }
.hero-desc { color: var(--text2); font-size: 15px; line-height: 1.6; margin-bottom: 24px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.btn-primary { background: var(--purple); color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
main { position: relative; z-index: 1; padding: 0 32px 60px; }
.section { margin-bottom: 48px; }
.section-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-title::before { content: ''; width: 4px; height: 20px; background: var(--purple); border-radius: 2px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.movie-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.25s; }
.movie-card:hover { transform: translateY(-4px); border-color: var(--purple3); box-shadow: 0 12px 32px rgba(124,106,247,0.2); }
.card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--bg3); }
.card-info { padding: 10px 12px 12px; }
.card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.detail-page { display: none; }
.player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-top: 20px; border: 1px solid var(--border); }
.player-wrap iframe { width: 100%; height: 100%; border: none; }
.seasons-list, .episodes-list { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 20px; }
.season-btn, .episode-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
.season-btn.active, .episode-btn.active { background: var(--purple); color: #fff; }

<body>
<nav>
  <div class="logo" onclick="location.reload()">Di<span>z</span>yon</div>
  <div class="nav-links">
    <button class="nav-link active" onclick="showPage('home')">Ana Sayfa</button>
    <button class="nav-link" onclick="loadCat('movies')">Filmler</button>
    <button class="nav-link" onclick="loadCat('series')">Diziler</button>
    <button class="nav-link" onclick="loadCat('turkish')">Türk Dizileri</button>
    <button class="nav-link" onclick="loadCat('russian')">Rus Dizileri</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Film, dizi ara..." id="searchInput">
  </div>
</nav>

<div class="ad-banner-top">REKLAM ALANI · 728×90</div>

<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-badge">⭐ Popüler</div>
      <h1 class="hero-title" id="heroTitle">Yükleniyor...</h1>
      <p class="hero-desc" id="heroDesc"></p>
      <button class="btn-primary" id="heroWatchBtn">▶ İzle</button>
    </div>
  </div>
  <main>
    <div class="section">
      <div class="section-title">🔥 Trend</div>
      <div class="cards-grid" id="trendingGrid"></div>
    </div>
    <div class="section">
      <div class="section-title">🎬 Popüler Filmler</div>
      <div class="cards-grid" id="popularMoviesGrid"></div>
    </div>
    <div class="section">
      <div class="section-title">📺 Popüler Diziler</div>
      <div class="cards-grid" id="popularSeriesGrid"></div>
    </div>
  </main>
</div>

<div id="page-movies" class="page" style="display:none; padding-top:100px;">
  <main><div class="section"><div class="section-title" id="catTitle">Sonuçlar</div><div class="cards-grid" id="moviesGrid"></div></div></main>
</div>

<div id="page-detail" class="page" style="display:none; padding-top:100px;">
  <main>
    <div style="display:flex; gap:30px; margin-bottom:40px;">
      <img id="detailPoster" style="width:240px; border-radius:12px; border:3px solid var(--purple3);">
      <div>
        <h1 id="detailTitle" style="font-size:42px; margin-bottom:15px;"></h1>
        <p id="detailDesc" style="color:var(--text2); line-height:1.6; max-width:800px;"></p>
      </div>
    </div>
    <div id="seriesStructureSection" style="display:none;">
      <h3>Sezon Seç</h3><div class="seasons-list" id="seasonsList"></div>
      <h3>Bölüm Seç</h3><div class="episodes-list" id="episodesList"></div>
    </div>
    <div class="player-wrap"><iframe id="torrentioPlayer" allowfullscreen></iframe></div>
  </main>
</div>

<script>
const API_KEY = 'a21c1729b19e87ec3e690f05566cf2c6';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const BG_IMG = 'https://image.tmdb.org/t/p/original';
const CONFIG = "sort=seeders|language=russian,turkish,arabic,persian|qualityfilter=cam|sizefilter=25GB|realdebrid=2BAICHVH3JZSCIJN7CANPHP7R7OVHKP6FNHWUSLXATQEFUTDVOZQ";

let currentId = null;
let currentType = null;

document.addEventListener('DOMContentLoaded', () => {
    loadHome();
    setupSearch();
});

async function loadHome() {
    try {
        const res = await fetch(`${BASE_URL}/trending/all/week?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
        if(res.results) {
            const top = res.results[0];
            const heroBg = document.getElementById('heroBg');
            if(heroBg) heroBg.style.backgroundImage = `url(${BG_IMG}${top.backdrop_path})`;
            if(document.getElementById('heroTitle')) document.getElementById('heroTitle').innerText = top.title || top.name;
            if(document.getElementById('heroDesc')) document.getElementById('heroDesc').innerText = top.overview;
            const watchBtn = document.getElementById('heroWatchBtn') || document.getElementById('heroPlayBtn');
            if(watchBtn) watchBtn.onclick = () => openDetailPage(top.id, top.media_type || 'movie');
            renderGrid(res.results.slice(0,12), 'trendingGrid');
        }
        const mRes = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
        renderGrid(mRes.results.slice(0,12), 'popularMoviesGrid');
        const sRes = await fetch(`${BASE_URL}/tv/popular?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
        renderGrid(sRes.results.slice(0,12), 'popularSeriesGrid');
    } catch(e) { console.log(e); }
}

function renderGrid(items, gridId, typeOverride = null) {
    const grid = document.getElementById(gridId);
    if(!grid) return;
    grid.innerHTML = '';
    items.forEach(i => {
        const type = typeOverride || i.media_type || (i.title ? 'movie' : 'tv');
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => openDetailPage(i.id, type);
        card.innerHTML = `<img src="${IMG}${i.poster_path}" class="card-poster"><div class="card-info"><div class="card-title">${i.title||i.name}</div><div class="card-meta"><span>⭐ ${i.vote_average.toFixed(1)}</span></div></div>`;
        grid.appendChild(card);
    });
}

async function openDetailPage(id, type) {
    currentId = id; currentType = type;
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    const detPage = document.getElementById('page-detail') || document.getElementById('detail-page');
    if(detPage) detPage.style.display = 'block';
    
    const data = await fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
    if(document.getElementById('detailBg')) document.getElementById('detailBg').style.backgroundImage = `url(${BG_IMG}${data.backdrop_path})`;
    if(document.getElementById('detailPoster')) document.getElementById('detailPoster').src = IMG + data.poster_path;
    if(document.getElementById('detailTitle')) document.getElementById('detailTitle').innerText = data.title || data.name;
    if(document.getElementById('detailDesc')) document.getElementById('detailDesc').innerText = data.overview;

    const seriesUI = document.getElementById('seriesStructureSection') || document.getElementById('seriesUI');
    if(type === 'tv') {
        if(seriesUI) seriesUI.style.display = 'block';
        let sHtml = '';
        for(let s=1; s<=data.number_of_seasons; s++) sHtml += `<button class="season-btn ${s===1?'active':''}" onclick="loadEps(${s})">${s}. Sezon</button>`;
        const sList = document.getElementById('seasonsList') || document.getElementById('sList');
        if(sList) sList.innerHTML = sHtml;
        loadEps(1);
    } else {
        if(seriesUI) seriesUI.style.display = 'none';
        setPlayer(id, 'movie');
    }
    window.scrollTo(0,0);
}

async function loadEps(sNum) {
    document.querySelectorAll('.season-btn').forEach((b,idx) => b.classList.toggle('active', idx+1===sNum));
    const res = await fetch(`${BASE_URL}/tv/${currentId}/season/${sNum}?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
    let eHtml = '';
    res.episodes.forEach(e => eHtml += `<button class="episode-btn" onclick="setPlayer('${currentId}:${sNum}:${e.episode_number}', 'tv')">${e.episode_number}. Bölüm</button>`);
    const eList = document.getElementById('episodesList') || document.getElementById('eList');
    if(eList) eList.innerHTML = eHtml;
    setPlayer(`${currentId}:${sNum}:1`, 'tv');
}

function setPlayer(id, type) {
    const p = document.getElementById('torrentioPlayer') || document.getElementById('player');
    if(p) p.src = `https://stremio-embed.netlify.app/#/player?type=${type}&id=${id}&config=${encodeURIComponent(CONFIG)}`;
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    const target = document.getElementById('page-' + id) || document.getElementById(id);
    if(target) target.style.display = 'block';
}

function setupSearch() {
    const input = document.getElementById('searchInput');
    if(!input) return;
    input.onkeypress = async (e) => {
        if(e.key === 'Enter') {
            const val = input.value;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${val}&language=tr-TR`).then(r => r.json());
            showPage('movies');
            renderGrid(res.results.filter(x=>x.poster_path), 'moviesGrid' || 'catGrid');
        }
    };
}

async function loadCat(mode) {
    showPage('movies');
    let url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=tr-TR`;
    if(mode==='series') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&language=tr-TR`;
    if(mode==='turkish') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_origin_country=TR&language=tr-TR`;
    if(mode==='russian') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_origin_country=RU&language=tr-TR`;
    const res = await fetch(url).then(r=>r.json());
    renderGrid(res.results, 'moviesGrid' || 'catGrid', (mode==='movies'?'movie':'tv'));
}
</script>

</body>
