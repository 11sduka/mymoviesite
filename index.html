<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizyon — Film & Dizi Platformu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080010;
  --bg2: #0d0018;
  --bg3: #120020;
  --purple: #7c6af7;
  --purple2: #9d8fff;
  --purple3: #5a4fd4;
  --pink: #c084fc;
  --text: #f0eaff;
  --text2: #a094c0;
  --text3: #6a5f8a;
  --border: #1e1035;
  --card: #0f0018;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--purple3); border-radius: 3px; }

/* BG GRID */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(var(--purple)08 1px, transparent 1px),
    linear-gradient(90deg, var(--purple)08 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(8,0,16,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  cursor: pointer;
  flex-shrink: 0;
}

.logo span { color: var(--purple); }

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}

.nav-link {
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  border: none;
  background: none;
}

.nav-link:hover { color: var(--text); background: var(--border); }
.nav-link.active { color: var(--purple2); background: rgba(124,106,247,0.12); }

.search-wrap {
  position: relative;
  flex-shrink: 0;
}

.search-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px 8px 38px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  width: 220px;
  outline: none;
  transition: all 0.2s;
}

.search-input:focus {
  border-color: var(--purple3);
  width: 280px;
  background: var(--bg2);
}

.search-input::placeholder { color: var(--text3); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}

/* REKLAM ALANI - NAV ALTI */
.ad-banner-top {
  margin-top: 64px;
  width: 100%;
  min-height: 90px;
  background: rgba(124,106,247,0.04);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 13px;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}

/* HERO */
.hero {
  position: relative;
  height: 560px;
  overflow: hidden;
  z-index: 1;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  filter: brightness(0.35) saturate(0.8);
  transition: all 0.6s;
}

.hero-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, var(--bg) 30%, transparent 70%),
    linear-gradient(to top, var(--bg) 0%, transparent 50%);
}

.hero-content {
  position: absolute;
  bottom: 60px;
  left: 40px;
  max-width: 500px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(124,106,247,0.2);
  border: 1px solid rgba(124,106,247,0.4);
  color: var(--purple2);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: 48px;
  font-weight: 800;
  line-height: 1.05;
  margin-bottom: 12px;
  letter-spacing: -1px;
}

.hero-meta {
  color: var(--text2);
  font-size: 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.hero-rating {
  color: var(--purple2);
  font-weight: 600;
}

.hero-desc {
  color: var(--text2);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 24px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-btns { display: flex; gap: 12px; }

.btn-primary {
  background: var(--purple);
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover { background: var(--purple2); transform: translateY(-1px); }

.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 12px 24px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondary:hover { background: rgba(255,255,255,0.12); }

/* MAIN CONTENT */
main {
  position: relative;
  z-index: 1;
  padding: 0 32px 60px;
}

/* SECTION */
.section { margin-bottom: 48px; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: '';
  width: 4px;
  height: 20px;
  background: var(--purple);
  border-radius: 2px;
  display: inline-block;
}

.see-all {
  color: var(--purple2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  background: none;
  border: none;
  transition: color 0.2s;
}
.see-all:hover { color: var(--pink); }

/* CARDS GRID */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

.ad-inline {
  grid-column: 1 / -1;
  min-height: 100px;
  background: rgba(124,106,247,0.04);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 13px;
  letter-spacing: 1px;
  margin: 8px 0;
}

.movie-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}

.movie-card:hover {
  transform: translateY(-4px);
  border-color: var(--purple3);
  box-shadow: 0 12px 32px rgba(124,106,247,0.2);
}

.card-poster {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  background: var(--bg3);
}

.card-info { padding: 10px 12px 12px; }
.card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text3); }
.card-rating { color: var(--purple2); font-weight: 600; font-size: 12px; }

/* LOADING & EMPTY */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text3); font-size: 14px; gap: 10px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* DETAIL PAGE */
.detail-hero { position: relative; height: 500px; overflow: hidden; }
.detail-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; filter: brightness(0.3) saturate(0.7); }
.detail-hero-gradient { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 60%); }
.detail-back { position: absolute; top: 80px; left: 32px; background: rgba(124,106,247,0.2); border: 1px solid var(--purple3); color: var(--text); padding: 8px 18px; border-radius: 8px; cursor: pointer; z-index: 10; }
.detail-main { padding: 0 40px 60px; position: relative; z-index: 1; }
.detail-top { display: flex; gap: 32px; margin-top: -140px; align-items: flex-end; margin-bottom: 32px; }
.detail-poster { width: 200px; height: 300px; object-fit: cover; border-radius: 12px; border: 3px solid var(--purple3); flex-shrink: 0; }
.detail-info { flex: 1; }
.detail-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 12px; }
.detail-desc { color: var(--text2); font-size: 15px; line-height: 1.7; margin-bottom: 24px; max-width: 700px; }

/* PLAYER */
.player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.player-wrap iframe { width: 100%; height: 100%; border: none; }
.seasons-list, .episodes-list { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; margin-top: 10px; }
.season-btn, .episode-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; }
.season-btn.active, .episode-btn.active { background: rgba(124,106,247,0.2); border-color: var(--purple); color: var(--purple2); }

@media (max-width: 768px) {
  nav { padding: 0 12px; gap: 8px; }
  .nav-links { display: none; }
  .search-input { width: 140px; }
  .hero { height: 400px; }
  .detail-top { flex-direction: column; align-items: center; text-align: center; margin-top: -100px; }
}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Di<span>z</span>yon</div>
  <div class="nav-links">
    <button class="nav-link active" onclick="showPage('home')" id="nav-home">Ana Sayfa</button>
    <button class="nav-link" onclick="showPage('movies')" id="nav-movies">Filmler</button>
    <button class="nav-link" onclick="showPage('series')" id="nav-series">Diziler</button>
    <button class="nav-link" onclick="showPage('turkish')" id="nav-turkish">Türk Dizileri</button>
    <button class="nav-link" onclick="showPage('russian')" id="nav-russian">Rus Dizileri</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Film, dizi ara..." id="searchInput">
  </div>
</nav>

<div class="ad-banner-top">REKLAM ALANI · 728×90</div>

<div class="page active" id="page-home">
  <div class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-badge">⭐ Popüler</div>
      <div class="hero-title" id="heroTitle">Yükleniyor...</div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-desc" id="heroDesc"></div>
      <div class="hero-btns">
        <button class="btn-primary" id="heroWatchBtn">▶ İzle</button>
      </div>
    </div>
  </div>
  <main>
    <div class="section">
      <div class="section-title">🔥 Trend</div>
      <div class="cards-grid" id="trendingGrid"></div>
    </div>
    <div class="section">
      <div class="section-title">🎬 Filmler</div>
      <div class="cards-grid" id="homeMoviesGrid"></div>
    </div>
    <div class="ad-inline">REKLAM ALANI · 970×90</div>
    <div class="section">
      <div class="section-title">📺 Diziler</div>
      <div class="cards-grid" id="homeSeriesGrid"></div>
    </div>
  </main>
</div>

<div class="page" id="page-movies"><main><div class="section"><div class="section-title">Filmler</div><div class="cards-grid" id="moviesGrid"></div></div></main></div>
<div class="page" id="page-series"><main><div class="section"><div class="section-title">Diziler</div><div class="cards-grid" id="seriesGrid"></div></div></main></div>
<div class="page" id="page-turkish"><main><div class="section"><div class="section-title">Türk Dizileri</div><div class="cards-grid" id="turkishGrid"></div></div></main></div>
<div class="page" id="page-russian"><main><div class="section"><div class="section-title">Rus Dizileri</div><div class="cards-grid" id="russianGrid"></div></div></main></div>

<div class="page" id="page-detail">
  <div class="detail-hero">
    <div class="detail-bg" id="detailBg"></div>
    <div class="detail-hero-gradient"></div>
    <button class="detail-back" onclick="goBack()">← Geri</button>
  </div>
  <main class="detail-main">
    <div class="detail-top">
      <img class="detail-poster" id="detailPoster">
      <div class="detail-info">
        <h1 class="detail-title" id="detailTitle"></h1>
        <div class="detail-meta-row">
            <span id="detailRating" style="color:var(--purple2); font-weight:700;"></span>
            <span id="detailYear"></span>
        </div>
        <p class="detail-desc" id="detailDesc"></p>
        <button class="btn-primary" onclick="document.getElementById('playerSection').scrollIntoView({behavior:'smooth'})">▶ İzle</button>
      </div>
    </div>

    <div id="seriesStructureSection" style="display:none">
      <h3>Sezon Seç</h3>
      <div class="seasons-list" id="seasonsList"></div>
      <h3>Bölüm Seç</h3>
      <div class="episodes-list" id="episodesList"></div>
    </div>

    <div id="playerSection" style="margin-top:40px">
      <div class="player-wrap">
        <iframe id="torrentioPlayer" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
    </div>
  </main>
</div>

<script>
const API_KEY = 'a21c1729b19e87ec3e690f05566cf2c6';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const BG_IMG = 'https://image.tmdb.org/t/p/original';

// ТВОЯ ССЫЛКА TORRENTIO
const CONFIG = "sort=seeders|language=russian,turkish,arabic,persian|qualityfilter=cam|sizefilter=25GB|realdebrid=2BAICHVH3JZSCIJN7CANPHP7R7OVHKP6FNHWUSLXATQEFUTDVOZQ";

let curId = null;
let curType = null;
let history = ['home'];

window.onload = () => {
    initHome();
    setupSearch();
};

async function initHome() {
    try {
        const trending = await fetch(`${BASE_URL}/trending/all/week?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
        if(trending.results) {
            updateHero(trending.results[0]);
            renderGrid(trending.results.slice(0,12), 'trendingGrid');
        }
        const movies = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
        renderGrid(movies.results.slice(0,12), 'homeMoviesGrid');
        
        const series = await fetch(`${BASE_URL}/tv/popular?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
        renderGrid(series.results.slice(0,12), 'homeSeriesGrid');
    } catch(e) { console.error("TMDB Error", e); }
}

function updateHero(item) {
    document.getElementById('heroBg').style.backgroundImage = `url(${BG_IMG}${item.backdrop_path})`;
    document.getElementById('heroTitle').innerText = item.title || item.name;
    document.getElementById('heroDesc').innerText = item.overview;
    document.getElementById('heroMeta').innerText = `⭐ ${item.vote_average.toFixed(1)} | ${item.release_date || item.first_air_date}`;
    document.getElementById('heroWatchBtn').onclick = () => openDetailPage(item.id, item.media_type || 'movie');
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    if(document.getElementById('nav-'+pageId)) document.getElementById('nav-'+pageId).classList.add('active');
    
    if(pageId === 'movies') loadCat('movie', 'moviesGrid');
    if(pageId === 'series') loadCat('tv', 'seriesGrid');
    if(pageId === 'turkish') loadCat('tv', 'turkishGrid', '&with_origin_country=TR');
    if(pageId === 'russian') loadCat('tv', 'russianGrid', '&with_origin_country=RU');
}

async function loadCat(type, gridId, extra = '') {
    const data = await fetch(`${BASE_URL}/discover/${type}?api_key=${API_KEY}${extra}&language=tr-TR`).then(r => r.json());
    renderGrid(data.results, gridId, type);
}

function renderGrid(items, gridId, forceType = null) {
    const grid = document.getElementById(gridId);
    if(!grid) return;
    grid.innerHTML = '';
    items.forEach(item => {
        const type = forceType || item.media_type || (item.title ? 'movie' : 'tv');
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => openDetailPage(item.id, type);
        card.innerHTML = `
            <img class="card-poster" src="${IMG}${item.poster_path}">
            <div class="card-info">
                <div class="card-title">${item.title || item.name}</div>
                <div class="card-meta"><span>⭐ ${item.vote_average.toFixed(1)}</span></div>
            </div>
        `;
        grid.appendChild(card);
    });
}

async function openDetailPage(id, type) {
    curId = id; curType = type;
    showPage('detail');
    const data = await fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
    
    document.getElementById('detailBg').style.backgroundImage = `url(${BG_IMG}${data.backdrop_path})`;
    document.getElementById('detailPoster').src = IMG + data.poster_path;
    document.getElementById('detailTitle').innerText = data.title || data.name;
    document.getElementById('detailDesc').innerText = data.overview;
    document.getElementById('detailRating').innerText = `⭐ ${data.vote_average.toFixed(1)}`;
    
    const seriesSection = document.getElementById('seriesStructureSection');
    if(type === 'tv') {
        seriesSection.style.display = 'block';
        setupSeasons(data.number_of_seasons);
    } else {
        seriesSection.style.display = 'none';
        setPlayer(1, 1);
    }
}

function setupSeasons(count) {
    const list = document.getElementById('seasonsList');
    list.innerHTML = '';
    for(let i=1; i<=count; i++) {
        const btn = document.createElement('button');
        btn.className = 'season-btn' + (i===1 ? ' active' : '');
        btn.innerText = i + '. Sezon';
        btn.onclick = (e) => {
            document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            loadEpisodes(i);
        };
        list.appendChild(btn);
    }
    loadEpisodes(1);
}

async function loadEpisodes(sNum) {
    const data = await fetch(`${BASE_URL}/tv/${curId}/season/${sNum}?api_key=${API_KEY}&language=tr-TR`).then(r => r.json());
    const list = document.getElementById('episodesList');
    list.innerHTML = '';
    data.episodes.forEach(ep => {
        const btn = document.createElement('button');
        btn.className = 'episode-btn';
        btn.innerText = ep.episode_number + '. Bölüm';
        btn.onclick = (e) => {
            document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            setPlayer(sNum, ep.episode_number);
        };
        list.appendChild(btn);
    });
    setPlayer(sNum, 1);
}

function setPlayer(s, e) {
    const iframe = document.getElementById('torrentioPlayer');
    let id = curId;
    if(curType === 'tv') id = `${curId}:${s}:${e}`;
    
    const url = `https://stremio-embed.netlify.app/#/player?type=${curType}&id=${id}&config=${encodeURIComponent(CONFIG)}`;
    iframe.src = url;
}

function goBack() { showPage('home'); }

function setupSearch() {
    const input = document.getElementById('searchInput');
    input.onkeypress = async (e) => {
        if(e.key === 'Enter') {
            const val = input.value;
            const data = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${val}&language=tr-TR`).then(r => r.json());
            showPage('movies');
            renderGrid(data.results.filter(i => i.poster_path), 'moviesGrid');
        }
    };
}
</script>
</body>
</html>
