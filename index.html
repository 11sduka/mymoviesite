<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizyon — Film & Dizi Platformu</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* ТВОЙ ОРИГИНАЛЬНЫЙ ДИЗАЙН  */
:root {
  --bg: #080010; --bg2: #0d0018; --bg3: #120020;
  --purple: #7c6af7; --purple2: #9d8fff; --purple3: #5a4fd4;
  --pink: #c084fc; --text: #f0eaff; --text2: #a094c0;
  --text3: #6a5f8a; --border: #1e1035; --card: #0f0018; --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--purple)08 1px, transparent 1px), linear-gradient(90deg, var(--purple)08 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

/* NAV [cite: 8, 9] */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,0,16,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; gap: 32px; }
.logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--text); cursor: pointer; flex-shrink: 0; }
.logo span { color: var(--purple); }
.nav-links { display: flex; align-items: center; gap: 4px; flex: 1; }
.nav-link { color: var(--text2); font-size: 14px; font-weight: 500; padding: 6px 14px; border-radius: 6px; cursor: pointer; border: none; background: none; }
.nav-link.active { color: var(--purple2); background: rgba(124,106,247,0.12); }

/* ПОИСК [cite: 14, 15] */
.search-wrap { position: relative; }
.search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px 8px 38px; color: var(--text); width: 220px; outline: none; }

/* СЕКЦИИ [cite: 31, 33] */
main { position: relative; z-index: 1; padding: 0 32px 60px; }
.section { margin-top: 48px; }
.section-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-title::before { content: ''; width: 4px; height: 20px; background: var(--purple); border-radius: 2px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }

/* КАРТОЧКА [cite: 34, 35, 36, 37] */
.movie-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: 0.25s; }
.movie-card:hover { transform: translateY(-4px); border-color: var(--purple3); }
.card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.card-info { padding: 10px; }
.card-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* HERO СЕКЦИЯ [cite: 19, 21, 24] */
.hero { position: relative; height: 560px; overflow: hidden; z-index: 1; margin-top: 64px; }
.hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; filter: brightness(0.35); }
.hero-gradient { position: absolute; inset: 0; background: linear-gradient(to right, var(--bg) 30%, transparent 70%), linear-gradient(to top, var(--bg) 0%, transparent 50%); }
.hero-content { position: absolute; bottom: 60px; left: 40px; max-width: 500px; }
.hero-title { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; margin-bottom: 12px; }
.btn-primary { background: var(--purple); color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }

/* МОДАЛКА ПЛЕЕРА [cite: 39, 40] */
#player-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
.player-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #0a0016; border-bottom: 1px solid var(--border); }
.close-player { font-size: 24px; cursor: pointer; color: var(--purple2); }
#playerContainer { flex-grow: 1; }
iframe { width: 100%; height: 100%; border: none; }

.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Di<span>z</span>yon</div>
  <div class="nav-links">
    <button class="nav-link active" onclick="showPage('home')">Ana Sayfa</button>
    <button class="nav-link" onclick="showPage('movies')">Filmler</button>
    <button class="nav-link" onclick="showPage('series')">Diziler</button>
    <button class="nav-link" onclick="showPage('turkish')">Türk Dizileri</button>
    <button class="nav-link" onclick="showPage('russian')">Rus Dizileri</button>
    <button class="nav-link" onclick="showPage('anime')">Anime</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Film, dizi ara..." id="searchInput">
  </div>
</nav>

<div class="page active" id="page-home">
  <div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
        <h1 class="hero-title" id="heroTitle">Yükleniyor...</h1>
        <button class="btn-primary" id="heroPlayBtn">▶ İzle</button>
    </div>
  </div>
  <main>
    <div class="section"><div class="section-title">🔥 Trendler</div><div id="trendingGrid" class="cards-grid"></div></div>
    <div class="section"><div class="section-title">🇹🇷 Türk Dizileri</div><div id="turkishGrid" class="cards-grid"></div></div>
    <div class="section"><div class="section-title">🇷🇺 Rus Dizileri</div><div id="russianGrid" class="cards-grid"></div></div>
    <div class="section"><div class="section-title">⛩️ Anime</div><div id="animeGrid" class="cards-grid"></div></div>
  </main>
</div>

<div class="page" id="page-category">
  <main style="padding-top:80px">
    <div class="section"><div class="section-title" id="categoryTitle">Kategori</div><div id="categoryGrid" class="cards-grid"></div></div>
  </main>
</div>

<div id="player-modal">
  <div class="player-header">
    <div id="playerTitle" style="font-weight: bold;"></div>
    <div class="close-player" onclick="closePlayer()"><i class="fas fa-times"></i></div>
  </div>
  <div id="playerContainer"></div>
</div>

<script>
const API_KEY = 'a21c1729b19e87ec3e690f05566cf2c6'; [cite: 49]
const BASE_URL = 'https://api.themoviedb.org/3'; [cite: 49]
const IMG_URL = 'https://image.tmdb.org/t/p/w500';
const BG_URL = 'https://image.tmdb.org/t/p/original';

document.addEventListener('DOMContentLoaded', () => {
    loadHome(); [cite: 50]
    setupSearch(); [cite: 77]
});

async function loadHome() {
    try {
        const trendData = await fetch(`${BASE_URL}/trending/all/week?api_key=${API_KEY}&language=tr-TR`).then(r => r.json()); [cite: 51]
        if(trendData.results) {
            const top = trendData.results[0];
            document.getElementById('heroBg').style.backgroundImage = `url('${BG_URL}${top.backdrop_path}')`; [cite: 57]
            document.getElementById('heroTitle').innerText = top.title || top.name; [cite: 57]
            document.getElementById('heroPlayBtn').onclick = () => openPlayer(top.media_type || 'movie', top.id, top.title || top.name); [cite: 58]
            renderGrid(trendData.results, 'trendingGrid'); [cite: 52]
        }
        // Загрузка категорий [cite: 53, 54, 55]
        const trData = await fetch(`${BASE_URL}/discover/tv?api_key=${API_KEY}&with_origin_country=TR&language=tr-TR`).then(r => r.json());
        renderGrid(trData.results, 'turkishGrid', 'tv');
        const ruData = await fetch(`${BASE_URL}/discover/tv?api_key=${API_KEY}&with_origin_country=RU&language=tr-TR`).then(r => r.json());
        renderGrid(ruData.results, 'russianGrid', 'tv');
        const animeData = await fetch(`${BASE_URL}/discover/tv?api_key=${API_KEY}&with_genres=16&with_origin_country=JP&language=tr-TR`).then(r => r.json());
        renderGrid(animeData.results, 'animeGrid', 'tv');
    } catch (e) { console.error(e); }
}

function renderGrid(items, gridId, typeDefault = 'movie') {
    const grid = document.getElementById(gridId);
    if(!grid) return;
    grid.innerHTML = '';
    items.slice(0, 12).forEach(item => {
        const title = item.title || item.name; [cite: 60]
        const type = item.media_type || typeDefault; [cite: 60]
        const div = document.createElement('div');
        div.className = 'movie-card';
        div.onclick = () => openPlayer(type, item.id, title); [cite: 60]
        div.innerHTML = `<img src="${IMG_URL}${item.poster_path}" class="card-poster"><div class="card-info"><div class="card-title">${title}</div></div>`;
        grid.appendChild(div);
    });
}

// ИСПРАВЛЕННАЯ ФУНКЦИЯ ПЛЕЕРА ДЛЯ TOR [cite: 63, 64]
function openPlayer(type, id, title) {
    const modal = document.getElementById('player-modal');
    const container = document.getElementById('playerContainer');
    document.getElementById('playerTitle').innerText = title;
    
    // Ссылка на твой плеер Torrentio
    const embedUrl = `https://stremio-embed.netlify.app/#/player?type=${type}&id=${id}`;
    
    // КРИТИЧНО: Добавлены разрешения sandbox и referrerpolicy для работы в Tor Browser
    container.innerHTML = `
        <iframe 
            src="${embedUrl}" 
            allowfullscreen 
            referrerpolicy="no-referrer"
            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation">
        </iframe>`;
        
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden'; [cite: 65]
}

function closePlayer() {
    document.getElementById('player-modal').style.display = 'none'; [cite: 66]
    document.getElementById('playerContainer').innerHTML = '';
    document.body.style.overflow = 'auto';
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); [cite: 67]
    if(pageId === 'home') document.getElementById('page-home').classList.add('active');
    else {
        document.getElementById('page-category').classList.add('active'); [cite: 68]
        loadCategory(pageId);
    }
}

async function loadCategory(cat) {
    let url = ""; [cite: 70]
    if(cat === 'movies') url = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=tr-TR`; [cite: 71]
    else if(cat === 'series') url = `${BASE_URL}/tv/popular?api_key=${API_KEY}&language=tr-TR`; [cite: 72]
    else if(cat === 'turkish') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_origin_country=TR&language=tr-TR`; [cite: 73]
    else if(cat === 'russian') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_origin_country=RU&language=tr-TR`; [cite: 74]
    else if(cat === 'anime') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_genres=16&with_origin_country=JP&language=tr-TR`; [cite: 75]
    
    const data = await fetch(url).then(r => r.json());
    renderGrid(data.results, 'categoryGrid', cat === 'movies' ? 'movie' : 'tv');
}

function setupSearch() {
    document.getElementById('searchInput').addEventListener('keypress', async (e) => {
        if(e.key === 'Enter') {
            const query = e.target.value; [cite: 77]
            showPage('category');
            const data = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}&language=tr-TR`).then(r => r.json());
            renderGrid(data.results.filter(i => i.media_type !== 'person'), 'categoryGrid'); [cite: 78]
        }
    });
}
</script>
</body>
</html>
